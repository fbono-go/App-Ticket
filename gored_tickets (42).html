<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff9500">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Area 51">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <title>Area 51 - Gestión de Tickets</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --primary: #ff9500;
      --text1: #1a1a1a;
      --text2: #666;
      --bg: #f9f9f9;
      --white: #fff;
      --border: #eee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text1);
      font-size: 14px;
    }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .content { flex: 1; overflow-y: auto; }
    .screen { display: none; }
    .screen.active { display: block; }
    .header { background: var(--white); padding: 16px; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .ph-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .back { background: none; border: none; cursor: pointer; font-size: 20px; }
    .section { padding: 16px; }
    .section-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { background: var(--white); padding: 16px; border-radius: 8px; text-align: center; cursor: pointer; user-select: none; }
    .card-num { font-size: 32px; font-weight: 700; color: var(--primary); }
    .card-label { font-size: 12px; color: var(--text2); margin-top: 8px; }
    .list { list-style: none; }
    .tk { background: var(--white); padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .tk-content { flex: 1; }
    .tk-num { font-weight: 700; color: var(--primary); font-size: 13px; }
    .tk-title { font-size: 14px; margin: 4px 0; }
    .tk-meta { font-size: 12px; color: var(--text2); }
    .tk-info { font-size: 20px; color: var(--text2); }
    .empty { text-align: center; padding: 32px 16px; color: var(--text2); }
    .nav { display: flex; background: var(--white); border-top: 1px solid var(--border); }
    .nav-btn { flex: 1; padding: 12px 8px; text-align: center; border: none; background: none; cursor: pointer; font-size: 12px; border-top: 3px solid transparent; color: var(--text2); }
    .nav-btn.active { color: var(--primary); border-top-color: var(--primary); }
    .detail { padding: 16px; }
    .detail-field { margin: 16px 0; }
    .detail-label { font-size: 12px; font-weight: 600; color: var(--text2); }
    .detail-value { font-size: 14px; margin-top: 4px; }
    .btn { background: var(--primary); color: var(--white); border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 12px; width: 100%; }
  </style>
</head>
<body>

<div class="app">
  <div class="content">
    <!-- HOME -->
    <div id="s-home" class="screen active">
      <div class="header">
        <h1>Panel principal</h1>
        <p id="fecha-hoy"></p>
      </div>
      <div class="section">
        <div class="cards">
          <div class="card" onclick="ir('s-espera')">
            <div class="card-num" id="cnt-espera">—</div>
            <div class="card-label">En espera</div>
          </div>
          <div class="card" onclick="ir('s-vendidos')">
            <div class="card-num" id="cnt-vendidos">—</div>
            <div class="card-label">Vendidos</div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Oficiales</div>
        <div class="cards">
          <div class="card" onclick="irOficial('A')">
            <div class="card-num" id="cnt-ofA">—</div>
            <div class="card-label">Elio M.<br>Of. A</div>
          </div>
          <div class="card" onclick="irOficial('B')">
            <div class="card-num" id="cnt-ofB">—</div>
            <div class="card-label">Carlos C.<br>Of. B</div>
          </div>
          <div class="card" onclick="irOficial('C')">
            <div class="card-num" id="cnt-ofC">—</div>
            <div class="card-label">Fausto C.<br>Of. C</div>
          </div>
          <div class="card" onclick="irOficial('D')">
            <div class="card-num" id="cnt-ofD">—</div>
            <div class="card-label">UVR<br>Proveedor</div>
          </div>
        </div>
      </div>
    </div>

    <!-- EN ESPERA -->
    <div id="s-espera" class="screen">
      <div class="header">
        <div class="ph-row">
          <button class="back" onclick="ir('s-home')">←</button>
          <h1>En espera</h1>
        </div>
      </div>
      <ul id="list-espera" class="list"></ul>
      <div id="empty-espera" class="empty" style="display:none">Sin tickets</div>
    </div>

    <!-- OFICIAL -->
    <div id="s-oficial" class="screen">
      <div class="header">
        <div class="ph-row">
          <button class="back" onclick="ir('s-home')">←</button>
          <h1 id="oficial-title">Oficial</h1>
        </div>
      </div>
      <ul id="list-oficial" class="list"></ul>
      <div id="empty-oficial" class="empty" style="display:none">Sin tickets</div>
    </div>

    <!-- DETALLE -->
    <div id="s-detalle" class="screen">
      <div class="header">
        <div class="ph-row">
          <button class="back" onclick="ir('s-home')">←</button>
          <h1 id="detalle-num">#0</h1>
        </div>
      </div>
      <div id="detalle-content" class="detail"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="bn-home" onclick="irNav('s-home', this)">Inicio</button>
    <button class="nav-btn" id="bn-espera" onclick="irNav('s-espera', this)">En espera</button>
  </nav>
</div>

<script>
const PROXY = 'https://gored-proxy.onrender.com';
const OFICIALES = {
  A: { id: 67, nombre: 'Elio Molina' },
  B: { id: 66, nombre: 'Carlos Carranza' },
  C: { id: 68, nombre: 'Fausto Casco' },
  D: { id: 76, nombre: 'UVR Proveedor' }
};
const CUSTOMERS = {39:'Juan pablo pioli',40:'Simon Villavicencio Referente',41:'Pedidos Grupo Oroño Referente',56:'—',58:'Guillermo Cereijo',59:'Soledad Del Cerro Referente',62:'Mariana Serrano Oar Referente',64:'Agustín Gentiletti Oficial',72:'Néstor Bacaro Oficial',74:'Gutierrez Elias Oficial',78:'Sistemas Sanatorio de Niños',79:'Emiliano Godoy Oficial',85:'Alejandra Coria',86:'Virginia Gianotti',87:'—',88:'—',89:'—',90:'N Latini',91:'—',92:'Amilcar Carrá',93:'—',94:'—',95:'—',96:'Diana Pool',97:'—',98:'—',99:'—',100:'—',101:'—',102:'—',103:'Guillermina Salandari',104:'Juan Manuel Torres Spavioli',105:'—',106:'Natalia Bussola',107:'Sergio Campi',108:'—',109:'—',110:'—',111:'Carloscarranza R',112:'Laura Gallo',113:'Mariana Bonel',114:'Judith Lic',115:'Pablo de Luca',116:'Mile Aquilanti95',117:'Natalia Tellechea',118:'—',119:'—',120:'—',121:'Carlamattio 1',122:'Cecilia Gonzalez',123:'Javier Marino',124:'—',125:'—',126:'—',127:'—',128:'Cecilia Delariestra Parque',129:'—',130:'Haydee Stroppi',131:'—',132:'—',133:'—',134:'—',135:'Roberto Villavicencio',136:'Martin Contarde',137:'Facundo Bachin',138:'Victoria Lioi',139:'Carolina Subira',140:'Aylen schiavulli',142:'—',143:'Camila Cascioni',144:'—',145:'—',146:'—',147:'—',148:'—',149:'—',150:'Cy Cristian',151:'—',152:'—',153:'—',154:'—',155:'Valeen 94',158:'—',159:'—',160:'Elio Molinas',161:'Tejerina Juan',162:'—',163:'—',166:'Ivan Cambiaso',168:'—',169:'—',170:'Gustavo Ratero',172:'Pily Mar',174:'—',175:'Micaela Bovyn',177:'—',183:'Martu Uviedo',185:'Suarez Leandro D',186:'Jannet Vallejos',187:'Daniel Kilstein',188:'—',76:'UVR Proveedor'};

let allTickets = [];

async function init() {
  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-AR');
  
  // Cargar datos
  try {
    const my = await fetch(PROXY + '/my_open_tickets').then(r => r.json());
    allTickets = Array.isArray(my) ? my : [];
    
    const ofs = await Promise.all([
      fetch(PROXY + '/oficial_tickets/66').then(r => r.json()),
      fetch(PROXY + '/oficial_tickets/67').then(r => r.json()),
      fetch(PROXY + '/oficial_tickets/68').then(r => r.json()),
      fetch(PROXY + '/oficial_tickets/76').then(r => r.json())
    ]);
    
    ofs.forEach(list => {
      if (Array.isArray(list)) {
        list.forEach(t => {
          if (!allTickets.find(x => x.id === t.id)) allTickets.push(t);
        });
      }
    });
    
    updateCounts();
    console.log('Cargados:', allTickets.length);
  } catch(e) {
    console.error(e);
  }
}

function updateCounts() {
  document.getElementById('cnt-espera').textContent = allTickets.filter(t => t.owner_id === 321).length;
  document.getElementById('cnt-vendidos').textContent = allTickets.filter(t => t.owner_id !== 321).length;
  document.getElementById('cnt-ofA').textContent = allTickets.filter(t => t.owner_id === 67).length;
  document.getElementById('cnt-ofB').textContent = allTickets.filter(t => t.owner_id === 66).length;
  document.getElementById('cnt-ofC').textContent = allTickets.filter(t => t.owner_id === 68).length;
  document.getElementById('cnt-ofD').textContent = allTickets.filter(t => t.owner_id === 76).length;
}

function ir(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
  
  if (screen === 's-espera') renderEspera();
  if (screen === 's-oficial') renderOficial();
}

function irNav(screen, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ir(screen);
}

function irOficial(key) {
  document.getElementById('oficial-title').textContent = OFICIALES[key].nombre;
  window.ofKey = key;
  ir('s-oficial');
}

function renderEspera() {
  const lista = allTickets.filter(t => t.owner_id === 321).slice(0, 50);
  const ul = document.getElementById('list-espera');
  ul.innerHTML = '';
  
  if (lista.length === 0) {
    document.getElementById('empty-espera').style.display = 'block';
    return;
  }
  document.getElementById('empty-espera').style.display = 'none';
  
  lista.forEach(t => {
    const li = document.createElement('li');
    li.className = 'tk';
    li.innerHTML = `
      <div class="tk-content">
        <div class="tk-num">#${t.number || t.id}</div>
        <div class="tk-title">${t.title || 'Sin título'}</div>
        <div class="tk-meta">${CUSTOMERS[t.customer_id] || '—'}</div>
      </div>
      <div class="tk-info">ℹ️</div>
    `;
    li.onclick = () => verDetalle(t.id);
    ul.appendChild(li);
  });
}

function renderOficial() {
  const of = OFICIALES[window.ofKey];
  const lista = allTickets.filter(t => t.owner_id === of.id).slice(0, 50);
  const ul = document.getElementById('list-oficial');
  ul.innerHTML = '';
  
  if (lista.length === 0) {
    document.getElementById('empty-oficial').style.display = 'block';
    return;
  }
  document.getElementById('empty-oficial').style.display = 'none';
  
  lista.forEach(t => {
    const li = document.createElement('li');
    li.className = 'tk';
    li.innerHTML = `
      <div class="tk-content">
        <div class="tk-num">#${t.number || t.id}</div>
        <div class="tk-title">${t.title || 'Sin título'}</div>
        <div class="tk-meta">${CUSTOMERS[t.customer_id] || '—'}</div>
      </div>
      <div class="tk-info">ℹ️</div>
    `;
    li.onclick = () => verDetalle(t.id);
    ul.appendChild(li);
  });
}

function verDetalle(id) {
  const t = allTickets.find(x => x.id === id);
  if (!t) return;
  
  document.getElementById('detalle-num').textContent = '#' + (t.number || t.id);
  document.getElementById('detalle-content').innerHTML = `
    <div class="detail-field">
      <div class="detail-label">Título</div>
      <div class="detail-value">${t.title || '—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Reportado por</div>
      <div class="detail-value">${CUSTOMERS[t.customer_id] || '—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Asignado a</div>
      <div class="detail-value">${Object.values(OFICIALES).find(o => o.id === t.owner_id)?.nombre || '—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Creado</div>
      <div class="detail-value">${new Date(t.created_at).toLocaleDateString('es-AR')}</div>
    </div>
  `;
  
  ir('s-detalle');
}

init();
</script>

</body>
</html>
